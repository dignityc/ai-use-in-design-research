<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Phase Value Association Quadrant</title>
  <style>
    :root {
      --ink: #172033;
      --muted: #667085;
      --line: #d8dee9;
      --page: #f5f7fb;
      --panel: #ffffff;
      --blue: #2754c5;
      --green: #1f8a4c;
      --red: #b42318;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--page);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    .shell {
      max-width: 1460px;
      margin: 0 auto;
      padding: 28px;
    }
    .top {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 16px;
    }
    h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.15;
    }
    .sub {
      max-width: 980px;
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }
    .back {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      height: 34px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--blue);
      background: #fff;
      font-size: 13px;
      font-weight: 750;
      text-decoration: none;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 14px;
    }
    button, select {
      height: 34px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--muted);
      font: inherit;
      font-size: 13px;
      font-weight: 800;
    }
    button {
      cursor: pointer;
    }
    button.active {
      border-color: var(--blue);
      background: var(--blue);
      color: #fff;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }
    .stat, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .stat {
      padding: 12px 14px;
    }
    .label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 850;
      text-transform: uppercase;
    }
    .metric {
      margin-top: 6px;
      font-size: 22px;
      font-weight: 850;
      line-height: 1;
    }
    .note {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
    }
    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(390px, .66fr);
      gap: 14px;
    }
    .panel {
      overflow: hidden;
    }
    .panel-head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #fbfcff;
    }
    .panel-title {
      margin: 0;
      font-size: 15px;
      font-weight: 800;
    }
    .panel-caption {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    .plot-wrap {
      padding: 12px;
      background: #fff;
    }
    .plot-svg {
      width: 100%;
      height: auto;
      display: block;
      border: 1px solid #edf1f7;
      border-radius: 8px;
      background: #fff;
    }
    .point {
      cursor: pointer;
    }
    .point circle {
      stroke: #fff;
      stroke-width: 2.5;
    }
    .point.active circle {
      stroke: #172033;
      stroke-width: 4;
    }
    .point text {
      pointer-events: none;
      user-select: none;
      paint-order: stroke;
      stroke: #fff;
      stroke-width: 4px;
      stroke-linejoin: round;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      padding: 12px 14px;
      border-top: 1px solid var(--line);
      background: #fbfcff;
      color: var(--muted);
      font-size: 12px;
    }
    .legend-dot {
      display: inline-block;
      width: 9px;
      height: 9px;
      border-radius: 999px;
      margin-right: 5px;
      vertical-align: -1px;
    }
    .side {
      display: grid;
      gap: 14px;
      align-content: start;
    }
    .list {
      padding: 12px 14px 14px;
      max-height: 620px;
      overflow: auto;
    }
    .card {
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }
    .card + .card {
      margin-top: 9px;
    }
    .card-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: start;
    }
    .card-title {
      margin: 0;
      font-size: 13px;
      font-weight: 850;
      line-height: 1.25;
    }
    .badge {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 2px 7px;
      border-radius: 999px;
      color: #065f46;
      background: #dff4e8;
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
    }
    .meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 7px;
      margin-top: 8px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.3;
    }
    .meta strong {
      display: block;
      color: var(--ink);
      font-size: 13px;
    }
    .insight {
      padding: 13px 16px 14px;
      border-top: 1px solid var(--line);
      background: #fbfcff;
    }
    .insight-title {
      margin: 0 0 6px;
      font-size: 12px;
      font-weight: 850;
      text-transform: uppercase;
    }
    .insight p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .table th,
    .table td {
      padding: 9px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }
    .table th {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      background: #fbfcff;
    }
    .section {
      margin-top: 14px;
    }
    .error {
      padding: 18px;
      color: var(--red);
      background: #fff;
      border: 1px solid #f4b8b8;
      border-radius: 8px;
    }
    @media (max-width: 980px) {
      .grid {
        grid-template-columns: 1fr;
      }
      .top {
        align-items: start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="top">
      <div>
        <h1>Phase Value Association Quadrant</h1>
        <p class="sub">Each point is an observed state tied to the selected phase. The x-axis shows benefit-side association strength; the y-axis shows risk-side association strength.</p>
      </div>
      <a class="back" href="./#phase">Back to Phase View</a>
    </div>

    <div id="app"><div class="error">Loading phase_state_level_analysis.json...</div></div>
  </main>

  <script>
    const variableColors = {
      Dimension: '#087c7a',
      Category: '#a75c00',
      Assistance: '#475467',
      Discipline: '#7c3aed'
    };
    const phases = ['Discover', 'Define', 'Develop', 'Deliver'];
    let data;
    let activePhase = 'Discover';
    let activeVariable = 'All';
    let selectedPointId = null;

    function fmt(number, digits = 1) {
      return Number(number).toLocaleString(undefined, { maximumFractionDigits: digits, minimumFractionDigits: digits });
    }
    function pct(number) {
      return `${Math.round(number * 100)}%`;
    }
    function shortLabel(label, n = 28) {
      const text = String(label || '');
      return text.length > n ? `${text.slice(0, n - 1)}...` : text;
    }
    function phasePoints() {
      return (data.quadrantPoints[activePhase] || [])
        .filter(point => activeVariable === 'All' || point.variable === activeVariable);
    }
    function variableColor(variable) {
      return variableColors[variable] || '#667085';
    }
    function maxAxis(points, key) {
      return Math.max(2.2, ...points.map(point => point[key] || 0)) * 1.08;
    }
    function xScale(value, maxX) {
      return 80 + (value / maxX) * 760;
    }
    function yScale(value, maxY) {
      return 590 - (value / maxY) * 500;
    }
    function radius(point) {
      return 7 + Math.min(13, Math.sqrt(point.observed) * 1.1);
    }
    function quadrantLabel(point) {
      if (point.enhancedStrength >= 1 && point.impairedStrength >= 1) return 'Trade-off';
      if (point.enhancedStrength >= 1) return 'Benefit-tied';
      if (point.impairedStrength >= 1) return 'Risk-tied';
      return 'Context-only';
    }
    function renderToolbar() {
      return `
        <div class="toolbar">
          ${phases.map(phase => `<button class="${phase === activePhase ? 'active' : ''}" data-phase="${phase}">${phase}</button>`).join('')}
          <select id="variableFilter">
            ${['All', 'Dimension', 'Category', 'Assistance', 'Discipline'].map(v => `<option value="${v}" ${v === activeVariable ? 'selected' : ''}>${v === 'All' ? 'All state types' : v}</option>`).join('')}
          </select>
        </div>
      `;
    }
    function renderStats(points) {
      const trade = points.filter(p => p.enhancedStrength >= 1 && p.impairedStrength >= 1).length;
      const benefit = points.filter(p => p.enhancedStrength >= 1 && p.impairedStrength < 1).length;
      const risk = points.filter(p => p.enhancedStrength < 1 && p.impairedStrength >= 1).length;
      return `
        <div class="stats">
          <div class="stat"><div class="label">Included cases</div><div class="metric">${data.metadata.includedCases}</div><div class="note">Source coded rows</div></div>
          <div class="stat"><div class="label">Value events</div><div class="metric">${data.metadata.valueMentionEvents}</div><div class="note">Enhanced/impaired mentions</div></div>
          <div class="stat"><div class="label">Shown states</div><div class="metric">${points.length}</div><div class="note">Positive observed-vs-expected ties</div></div>
          <div class="stat"><div class="label">Trade-off states</div><div class="metric">${trade}</div><div class="note">Benefit and risk both above expected</div></div>
          <div class="stat"><div class="label">Benefit / risk</div><div class="metric">${benefit}/${risk}</div><div class="note">One-sided association profile</div></div>
        </div>
      `;
    }
    function renderQuadrant(points) {
      const maxX = maxAxis(points, 'enhancedStrength');
      const maxY = maxAxis(points, 'impairedStrength');
      const baselineX = xScale(1, maxX);
      const baselineY = yScale(1, maxY);
      const pointMarkup = points.map(point => {
        const x = xScale(point.enhancedStrength, maxX);
        const y = yScale(point.impairedStrength, maxY);
        const isActive = selectedPointId === point.id;
        return `
          <g class="point ${isActive ? 'active' : ''}" data-point="${point.id}">
            <circle cx="${x}" cy="${y}" r="${radius(point)}" fill="${variableColor(point.variable)}" opacity=".92"></circle>
            <text x="${x}" y="${y + radius(point) + 14}" text-anchor="middle" fill="#172033" font-size="10" font-weight="760">${shortLabel(point.label, 22)}</text>
          </g>
        `;
      }).join('');
      return `
        <svg class="plot-svg" viewBox="0 0 920 660" role="img" aria-label="Phase value association quadrant">
          <rect x="80" y="90" width="${baselineX - 80}" height="${baselineY - 90}" fill="#fff7ed" opacity=".55"></rect>
          <rect x="${baselineX}" y="90" width="${840 - baselineX}" height="${baselineY - 90}" fill="#fff1f2" opacity=".55"></rect>
          <rect x="80" y="${baselineY}" width="${baselineX - 80}" height="${590 - baselineY}" fill="#f8fafc" opacity=".8"></rect>
          <rect x="${baselineX}" y="${baselineY}" width="${840 - baselineX}" height="${590 - baselineY}" fill="#ecfdf3" opacity=".6"></rect>
          <line x1="80" y1="${baselineY}" x2="840" y2="${baselineY}" stroke="#98a2b3" stroke-width="1.4" stroke-dasharray="5 5"></line>
          <line x1="${baselineX}" y1="90" x2="${baselineX}" y2="590" stroke="#98a2b3" stroke-width="1.4" stroke-dasharray="5 5"></line>
          <line x1="80" y1="590" x2="840" y2="590" stroke="#344054" stroke-width="1.4"></line>
          <line x1="80" y1="590" x2="80" y2="90" stroke="#344054" stroke-width="1.4"></line>
          <text x="460" y="635" text-anchor="middle" fill="#172033" font-size="13" font-weight="850">Benefit-side association strength: Enhanced co-occurrence / expected</text>
          <text x="22" y="340" transform="rotate(-90 22 340)" text-anchor="middle" fill="#172033" font-size="13" font-weight="850">Risk-side association strength: Impaired co-occurrence / expected</text>
          <text x="${(baselineX + 840) / 2}" y="${baselineY - 18}" text-anchor="middle" fill="#b42318" font-size="12" font-weight="850">Trade-off: benefit and risk both high</text>
          <text x="${(baselineX + 840) / 2}" y="${baselineY + 28}" text-anchor="middle" fill="#1f8a4c" font-size="12" font-weight="850">Benefit-tied</text>
          <text x="${baselineX - 95}" y="${baselineY - 18}" text-anchor="middle" fill="#a75c00" font-size="12" font-weight="850">Risk-tied</text>
          <text x="${baselineX - 95}" y="${baselineY + 28}" text-anchor="middle" fill="#667085" font-size="12" font-weight="850">Weak / context-only</text>
          <text x="${baselineX + 5}" y="608" fill="#667085" font-size="11">1.0</text>
          <text x="56" y="${baselineY - 5}" fill="#667085" font-size="11">1.0</text>
          ${pointMarkup}
        </svg>
      `;
    }
    function renderCard(point) {
      return `
        <article class="card">
          <div class="card-top">
            <h3 class="card-title">${point.variable}: ${point.label}</h3>
            <span class="badge">${quadrantLabel(point)}</span>
          </div>
          <div class="meta">
            <div>Enhanced / exp<strong>${fmt(point.enhancedStrength, 2)}</strong></div>
            <div>Impaired / exp<strong>${fmt(point.impairedStrength, 2)}</strong></div>
            <div>Residual<strong>${fmt(point.residual, 2)}</strong></div>
          </div>
          <div class="meta">
            <div>Observed<strong>${point.observed}</strong></div>
            <div>Enhanced obs<strong>${point.enhancedObserved}</strong></div>
            <div>Impaired obs<strong>${point.impairedObserved}</strong></div>
          </div>
        </article>
      `;
    }
    function selectedPoint(points) {
      return points.find(point => point.id === selectedPointId) || points[0];
    }
    function renderSide(points) {
      const selected = selectedPoint(points);
      const sorted = [...points].sort((a, b) => b.residual - a.residual);
      return `
        <div class="side">
          <section class="panel">
            <div class="panel-head">
              <h2 class="panel-title">${activePhase}: quadrant states</h2>
              <div class="panel-caption">Sorted by standardized residual, after filtering to states above expected for this phase.</div>
            </div>
            <div class="list">${sorted.map(renderCard).join('') || '<div class="note">No states match this filter.</div>'}</div>
          </section>
          <section class="panel">
            <div class="panel-head">
              <h2 class="panel-title">Selected state</h2>
              <div class="panel-caption">Click a point to inspect the exact benefit/risk split.</div>
            </div>
            <div class="list">${selected ? renderCard(selected) : '<div class="note">No point selected.</div>'}</div>
          </section>
        </div>
      `;
    }
    function renderTable(points) {
      const rows = points.map(point => `
        <tr>
          <td>${activePhase}</td>
          <td>${point.variable}</td>
          <td>${point.label}</td>
          <td>${fmt(point.enhancedStrength, 2)}</td>
          <td>${fmt(point.impairedStrength, 2)}</td>
          <td>${point.enhancedObserved}</td>
          <td>${point.impairedObserved}</td>
          <td>${fmt(point.residual, 2)}</td>
        </tr>
      `).join('');
      return `
        <section class="panel section">
          <div class="panel-head">
            <h2 class="panel-title">Quadrant evidence table</h2>
            <div class="panel-caption">Strength values above 1.0 mean the state appears with this phase more than expected on that value side.</div>
          </div>
          <table class="table">
            <thead><tr><th>Phase</th><th>Variable</th><th>State</th><th>Enhanced / expected</th><th>Impaired / expected</th><th>Enhanced obs</th><th>Impaired obs</th><th>Residual</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </section>
      `;
    }
    function renderLegend() {
      return `
        <div class="legend">
          ${Object.entries(variableColors).map(([v, c]) => `<span><i class="legend-dot" style="background:${c};"></i>${v}</span>`).join('')}
        </div>
      `;
    }
    function renderApp() {
      const points = phasePoints();
      if (!selectedPointId || !points.some(point => point.id === selectedPointId)) {
        selectedPointId = points[0]?.id || null;
      }
      document.getElementById('app').innerHTML = `
        <div class="toolbar">
          ${phases.map(phase => `<button class="${phase === activePhase ? 'active' : ''}" data-phase="${phase}">${phase}</button>`).join('')}
          <select id="variableFilter">
            ${['All', 'Dimension', 'Category', 'Assistance', 'Discipline'].map(v => `<option value="${v}" ${v === activeVariable ? 'selected' : ''}>${v === 'All' ? 'All state types' : v}</option>`).join('')}
          </select>
        </div>
        ${renderStats(points)}
        <div class="grid">
          <section class="panel">
            <div class="panel-head">
              <h2 class="panel-title">${activePhase}: benefit-risk association quadrant</h2>
              <div class="panel-caption">Points are phase-tied states. Position separates benefit-dominant, risk-dominant, and trade-off patterns.</div>
            </div>
            <div class="plot-wrap">${renderQuadrant(points)}</div>
            ${renderLegend()}
            <div class="insight">
              <p class="insight-title">Interpretation</p>
              <p>This view does not show raw frequency. It separates whether each state is unusually tied to enhanced value mentions, impaired value mentions, or both for the selected phase.</p>
            </div>
          </section>
          ${renderSide(points)}
        </div>
        ${renderTable(points)}
      `;
      document.querySelectorAll('button[data-phase]').forEach(button => {
        button.addEventListener('click', () => {
          activePhase = button.dataset.phase;
          selectedPointId = null;
          renderApp();
        });
      });
      document.getElementById('variableFilter').addEventListener('change', event => {
        activeVariable = event.target.value;
        selectedPointId = null;
        renderApp();
      });
      document.querySelectorAll('.point').forEach(point => {
        point.addEventListener('click', () => {
          selectedPointId = point.dataset.point;
          renderApp();
        });
      });
    }

    fetch('phase_state_level_analysis.json')
      .then(response => {
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.json();
      })
      .then(json => {
        data = json;
        renderApp();
      })
      .catch(error => {
        document.getElementById('app').innerHTML = `<div class="error">Could not load phase_state_level_analysis.json: ${error.message}</div>`;
      });
  </script>
</body>
</html>
