<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI-Use Archetype Clusters</title>
  <style>
    :root {
      --ink: #172033;
      --muted: #667085;
      --line: #d8dee9;
      --page: #f5f7fb;
      --panel: #ffffff;
      --blue: #2754c5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--page);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    .shell {
      max-width: 1480px;
      margin: 0 auto;
      padding: 28px;
    }
    .top {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 16px;
    }
    h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.15;
    }
    .sub {
      max-width: 980px;
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }
    .back {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      height: 34px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--blue);
      background: #fff;
      font-size: 13px;
      font-weight: 750;
      text-decoration: none;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(132px, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }
    .stat, .panel, .cluster-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .stat {
      padding: 12px 14px;
    }
    .label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 850;
      text-transform: uppercase;
    }
    .metric {
      margin-top: 6px;
      font-size: 22px;
      font-weight: 850;
      line-height: 1;
    }
    .note {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    .grid {
      display: grid;
      grid-template-columns: minmax(420px, 1fr) minmax(340px, .68fr);
      gap: 14px;
    }
    .panel {
      overflow: hidden;
    }
    .panel-head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #fbfcff;
    }
    .panel-title {
      margin: 0;
      font-size: 15px;
      font-weight: 850;
    }
    .panel-caption {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    .plot-wrap {
      padding: 12px;
      background: #fff;
    }
    .plot-svg {
      width: 100%;
      height: auto;
      max-height: 520px;
      display: block;
      border: 1px solid #edf1f7;
      border-radius: 8px;
      background:
        linear-gradient(#f1f4f9 1px, transparent 1px),
        linear-gradient(90deg, #f1f4f9 1px, transparent 1px),
        #fff;
      background-size: 32px 32px;
    }
    .item-point {
      cursor: pointer;
    }
    .item-point circle {
      stroke: #fff;
      stroke-width: 1.5;
    }
    .item-point.active circle {
      stroke: #172033;
      stroke-width: 4;
    }
    .cluster-label {
      fill: #172033;
      font-size: 13px;
      font-weight: 850;
      paint-order: stroke;
      stroke: #fff;
      stroke-width: 5px;
      stroke-linejoin: round;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      padding: 12px 14px;
      border-top: 1px solid var(--line);
      background: #fbfcff;
      color: var(--muted);
      font-size: 12px;
    }
    .legend-dot {
      display: inline-block;
      width: 9px;
      height: 9px;
      border-radius: 999px;
      margin-right: 5px;
      vertical-align: -1px;
    }
    .side {
      display: grid;
      gap: 14px;
      align-content: start;
    }
    .cluster-list {
      display: grid;
      gap: 10px;
      padding: 12px 14px 14px;
      max-height: 560px;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .cluster-card {
      min-width: 0;
      padding: 12px;
      cursor: pointer;
    }
    .cluster-card.active {
      outline: 3px solid rgba(39, 84, 197, .2);
      border-color: var(--blue);
    }
    .cluster-top {
      min-width: 0;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }
    .cluster-name {
      min-width: 0;
      margin: 0;
      font-size: 14px;
      font-weight: 850;
      line-height: 1.25;
      text-transform: capitalize;
    }
    .badge {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 2px 7px;
      border-radius: 999px;
      color: #064e3b;
      background: #dff4e8;
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
    }
    .path {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }
    .path span {
      display: inline-flex;
      max-width: 100%;
      min-height: 24px;
      align-items: center;
      padding: 3px 7px;
      border-radius: 6px;
      background: #f8fafc;
      border: 1px solid #e4e9f2;
      color: #344054;
      font-size: 11px;
      font-weight: 760;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .profile {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }
    .profile-box {
      min-width: 0;
      padding: 8px;
      border-radius: 7px;
      background: #fbfcff;
      border: 1px solid #edf1f7;
    }
    .profile-box b {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
    }
    .profile-box span {
      display: block;
      overflow: hidden;
      color: var(--ink);
      font-size: 12px;
      font-weight: 750;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .insight {
      padding: 13px 16px 14px;
      border-top: 1px solid var(--line);
      background: #fbfcff;
    }
    .insight-title {
      margin: 0 0 6px;
      font-size: 12px;
      font-weight: 850;
      text-transform: uppercase;
    }
    .insight p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .error {
      padding: 18px;
      color: #b42318;
      background: #fff;
      border: 1px solid #f4b8b8;
      border-radius: 8px;
    }
    @media (max-width: 820px) {
      .grid {
        grid-template-columns: 1fr;
      }
      .top {
        align-items: start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="top">
      <div>
        <h1>AI-Use Archetype Clusters</h1>
        <p class="sub">Coded AI-use items are clustered by categorical feature profiles. Cluster profiles are then interpreted as AI-use archetypes through their dominant phase, category, assistance type, and value signature.</p>
      </div>
      <a class="back" href="./#phase">Back to Phase View</a>
    </div>
    <div id="app"><div class="error">Loading ai_use_archetype_clusters.json...</div></div>
  </main>

  <script>
    const colors = ['#2754c5', '#087c7a', '#a75c00', '#7c3aed', '#b42318', '#475467', '#1f8a4c', '#c2410c'];
    let data;
    let activeCluster = 0;
    let activeItem = null;

    function pct(value) {
      return `${Math.round(value * 100)}%`;
    }
    function fmt(value, digits = 2) {
      return Number(value).toLocaleString(undefined, { maximumFractionDigits: digits, minimumFractionDigits: digits });
    }
    function short(text, n = 34) {
      const value = String(text || '');
      return value.length > n ? `${value.slice(0, n - 1)}...` : value;
    }
    function colorFor(rank) {
      return colors[rank % colors.length];
    }
    function clusterByRank(rank) {
      return data.clusters.find(cluster => cluster.rank === rank);
    }
    function renderStats() {
      const best = data.metadata.kScores.reduce((a, b) => a.silhouette > b.silhouette ? a : b);
      return `
        <div class="stats">
          <div class="stat"><div class="label">Clustered items</div><div class="metric">${data.metadata.includedItems}</div><div class="note">Included coded AI-use rows</div></div>
          <div class="stat"><div class="label">Feature states</div><div class="metric">${data.metadata.featureCount}</div><div class="note">Categorical features</div></div>
          <div class="stat"><div class="label">Archetypes</div><div class="metric">${data.metadata.clusterCount}</div><div class="note">KMeans clusters</div></div>
          <div class="stat"><div class="label">Best silhouette</div><div class="metric">${fmt(best.silhouette, 2)}</div><div class="note">k=${best.k}</div></div>
          <div class="stat"><div class="label">View</div><div class="metric">${data.metadata.visualization || 'SVD'}</div><div class="note">${data.metadata.visualizationInput || 'Used before KMeans'}</div></div>
        </div>
      `;
    }
    function clusterCentroids() {
      const groups = {};
      data.items.forEach(item => {
        if (!groups[item.clusterRank]) groups[item.clusterRank] = [];
        groups[item.clusterRank].push(item);
      });
      return Object.fromEntries(Object.entries(groups).map(([rank, items]) => {
        const x = items.reduce((sum, item) => sum + item.x, 0) / items.length;
        const y = items.reduce((sum, item) => sum + item.y, 0) / items.length;
        return [rank, { x, y, n: items.length }];
      }));
    }
    function renderScatter() {
      const centroids = clusterCentroids();
      const points = data.items.map(item => `
        <g class="item-point ${activeItem === item.rowNumber ? 'active' : ''}" data-item="${item.rowNumber}" data-cluster="${item.clusterRank}">
          <circle cx="${item.x}" cy="${item.y}" r="${item.clusterRank === activeCluster ? 5.6 : 4.2}" fill="${colorFor(item.clusterRank)}" opacity="${item.clusterRank === activeCluster ? '.9' : '.34'}"></circle>
        </g>
      `).join('');
      const labels = Object.entries(centroids).map(([rank, c]) => `
        <text class="cluster-label" x="${c.x}" y="${c.y - 17}" text-anchor="middle">${clusterByRank(Number(rank)).label}</text>
      `).join('');
      return `
        <svg class="plot-svg" viewBox="0 0 1000 700" role="img" aria-label="Archetype cluster embedding">
          <line x1="60" y1="350" x2="940" y2="350" stroke="#98a2b3" stroke-width="1.2" stroke-dasharray="5 6"></line>
          <line x1="500" y1="70" x2="500" y2="610" stroke="#98a2b3" stroke-width="1.2" stroke-dasharray="5 6"></line>
          ${points}
          ${labels}
        </svg>
      `;
    }
    function topValue(list) {
      return list?.[0]?.value || 'Mixed';
    }
    function renderClusterCard(cluster) {
      return `
        <article class="cluster-card ${cluster.rank === activeCluster ? 'active' : ''}" data-cluster="${cluster.rank}">
          <div class="cluster-top">
            <h3 class="cluster-name"><span style="color:${colorFor(cluster.rank)}">${cluster.label}</span> ${cluster.name}</h3>
            <span class="badge">${cluster.size} items</span>
          </div>
          <div class="path">${cluster.representativePath.map(step => `<span>${short(step, 42)}</span>`).join('')}</div>
          <div class="profile">
            <div class="profile-box"><b>Phase</b><span>${topValue(cluster.profile.phase)}</span></div>
            <div class="profile-box"><b>Category</b><span>${topValue(cluster.profile.category)}</span></div>
            <div class="profile-box"><b>AI role</b><span>${topValue(cluster.profile.assistance)}</span></div>
            <div class="profile-box"><b>Value signature</b><span>+${topValue(cluster.profile.enhanced)} / -${topValue(cluster.profile.impaired)}</span></div>
          </div>
          <div class="note">${pct(cluster.share)} of clustered items.</div>
        </article>
      `;
    }
    function renderSide() {
      const cluster = clusterByRank(activeCluster) || data.clusters[0];
      return `
        <div class="side">
          <section class="panel">
            <div class="panel-head">
              <h2 class="panel-title">Archetype profiles</h2>
              <div class="panel-caption">Click a card to highlight its items in the embedding.</div>
            </div>
            <div class="cluster-list">${data.clusters.map(renderClusterCard).join('')}</div>
          </section>
          <section class="panel">
            <div class="panel-head">
              <h2 class="panel-title">${cluster.label}: top discriminating features</h2>
              <div class="panel-caption">Features with high within-cluster share relative to overall share.</div>
            </div>
            <div class="cluster-list">
              ${cluster.topFeatures.slice(0, 8).map(feature => `
                <article class="cluster-card">
                  <div class="cluster-top">
                    <h3 class="cluster-name">${feature.kind}: ${feature.value}</h3>
                    <span class="badge">${fmt(feature.lift, 1)}x</span>
                  </div>
                  <div class="note">Within ${pct(feature.withinShare)} vs overall ${pct(feature.overallShare)}.</div>
                </article>
              `).join('')}
            </div>
          </section>
        </div>
      `;
    }
    function renderApp() {
      document.getElementById('app').innerHTML = `
        ${renderStats()}
        <div class="grid">
          <section class="panel">
            <div class="panel-head">
              <h2 class="panel-title">Item embedding by discovered archetype</h2>
              <div class="panel-caption">Each point is one coded AI-use item. Color shows its cluster; labels mark cluster centers.</div>
            </div>
            <div class="plot-wrap">${renderScatter()}</div>
            <div class="legend">${data.clusters.map(cluster => `<span><i class="legend-dot" style="background:${colorFor(cluster.rank)}"></i>${cluster.label} ${cluster.name}</span>`).join('')}</div>
            <div class="insight">
              <p class="insight-title">Interpretation rule</p>
              <p>Clusters are not predefined categories. They are item-level pattern groups; archetype names are assigned after inspecting dominant phase, category, AI role, and value signature.</p>
            </div>
          </section>
          ${renderSide()}
        </div>
      `;
      document.querySelectorAll('.cluster-card[data-cluster]').forEach(card => {
        card.addEventListener('click', () => {
          activeCluster = Number(card.dataset.cluster);
          activeItem = null;
          renderApp();
        });
      });
      document.querySelectorAll('.item-point').forEach(point => {
        point.addEventListener('click', () => {
          activeItem = Number(point.dataset.item);
          activeCluster = Number(point.dataset.cluster);
          renderApp();
        });
      });
    }
    fetch('ai_use_archetype_clusters.json')
      .then(response => {
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.json();
      })
      .then(json => {
        data = json;
        renderApp();
      })
      .catch(error => {
        document.getElementById('app').innerHTML = `<div class="error">Could not load ai_use_archetype_clusters.json: ${error.message}</div>`;
      });
  </script>
</body>
</html>
