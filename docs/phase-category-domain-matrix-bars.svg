<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <style>
      .bg { fill: #f5f7fb; }
      .panel { fill: #fff; stroke: #d8dee9; }
      .title { font: 800 30px Inter, Arial, sans-serif; fill: #172033; }
      .subtitle { font: 500 15px Inter, Arial, sans-serif; fill: #667085; }
      .axis { font: 800 13px Inter, Arial, sans-serif; fill: #667085; letter-spacing: .4px; }
      .category { font: 760 13px Inter, Arial, sans-serif; fill: #172033; }
      .phase { font: 800 15px Inter, Arial, sans-serif; fill: #172033; }
      .small { font: 700 11px Inter, Arial, sans-serif; fill: #667085; }
      .cell { fill: #ffffff; stroke: #e5eaf2; }
      .cell-alt { fill: #fbfcff; stroke: #e5eaf2; }
      .ed { fill: #2563eb; }
      .sd { fill: #ea580c; }
      .uiux { fill: #7c3aed; }
      .empty { fill: #e2e8f0; }
      .legend { font: 700 12px Inter, Arial, sans-serif; fill: #172033; }
      .total { font: 800 12px Inter, Arial, sans-serif; fill: #334155; }
    </style>
  </defs>
  <rect class="bg" width="1440" height="900"/>
  <rect class="panel" x="40" y="34" width="1360" height="820" rx="12"/>

  <text class="title" x="78" y="88">Phase - Category Domain Map: Mini Bar Matrix</text>
  <text class="subtitle" x="78" y="116">Rows are refined categories, columns are design phases, and each cell contains three domain bars.</text>
  <text class="subtitle" x="78" y="140">This avoids implying a flow while still mixing category, phase, and domain in one view.</text>

  <g transform="translate(78 178)">
    <rect x="0" y="-8" width="12" height="12" rx="2" class="ed"/>
    <text class="legend" x="18" y="2">ED</text>
    <rect x="62" y="-8" width="12" height="12" rx="2" class="sd"/>
    <text class="legend" x="80" y="2">SD</text>
    <rect x="126" y="-8" width="12" height="12" rx="2" class="uiux"/>
    <text class="legend" x="144" y="2">UIUX</text>
    <text class="small" x="220" y="2">Bar height = case count within each phase-category cell. Number = total cases in the cell.</text>
  </g>

  <text class="axis" x="78" y="240">REFINED CATEGORY</text>
  <text class="phase" x="480" y="240">Discover</text>
  <text class="phase" x="700" y="240">Define</text>
  <text class="phase" x="914" y="240">Develop</text>
  <text class="phase" x="1144" y="240">Deliver</text>

  <!-- grid geometry: label x=78, cells x=420/640/860/1080, y=270 + 80n, w=190 h=64 -->
  <g>
    <text class="category" x="78" y="307">Domain, Technical, and Market Knowledge</text>
    <rect class="cell-alt" x="420" y="270" width="190" height="64" rx="8"/>
    <rect class="ed" x="478" y="292" width="12" height="26" rx="2"/><rect class="sd" x="502" y="282" width="12" height="36" rx="2"/><rect class="uiux" x="526" y="298" width="12" height="20" rx="2"/>
    <text class="total" x="578" y="310">48</text>
    <rect class="cell" x="640" y="270" width="190" height="64" rx="8"/>
    <rect class="ed" x="698" y="306" width="12" height="12" rx="2"/><rect class="sd" x="722" y="304" width="12" height="14" rx="2"/><rect class="uiux" x="746" y="308" width="12" height="10" rx="2"/>
    <text class="total" x="798" y="310">11</text>
    <rect class="cell" x="860" y="270" width="190" height="64" rx="8"/>
    <rect class="empty" x="928" y="312" width="12" height="6" rx="2"/><rect class="sd" x="952" y="310" width="12" height="8" rx="2"/><rect class="uiux" x="976" y="312" width="12" height="6" rx="2"/>
    <text class="total" x="1018" y="310">4</text>
    <rect class="cell" x="1080" y="270" width="190" height="64" rx="8"/>
    <rect class="empty" x="1148" y="312" width="12" height="6" rx="2"/><rect class="sd" x="1172" y="310" width="12" height="8" rx="2"/><rect class="empty" x="1196" y="314" width="12" height="4" rx="2"/>
    <text class="total" x="1238" y="310">2</text>
  </g>

  <g>
    <text class="category" x="78" y="387">User / Customer Need Research</text>
    <rect class="cell" x="420" y="350" width="190" height="64" rx="8"/>
    <rect class="ed" x="478" y="306" width="12" height="12" rx="2" transform="translate(0 80)"/><rect class="sd" x="502" y="302" width="12" height="16" rx="2" transform="translate(0 80)"/><rect class="uiux" x="526" y="308" width="12" height="10" rx="2" transform="translate(0 80)"/>
    <text class="total" x="578" y="390">8</text>
    <rect class="cell-alt" x="640" y="350" width="190" height="64" rx="8"/>
    <rect class="ed" x="698" y="374" width="12" height="24" rx="2"/><rect class="sd" x="722" y="372" width="12" height="26" rx="2"/><rect class="uiux" x="746" y="380" width="12" height="18" rx="2"/>
    <text class="total" x="798" y="390">19</text>
    <rect class="cell" x="860" y="350" width="190" height="64" rx="8"/>
    <rect class="ed" x="928" y="388" width="12" height="10" rx="2"/><rect class="sd" x="952" y="384" width="12" height="14" rx="2"/><rect class="uiux" x="976" y="390" width="12" height="8" rx="2"/>
    <text class="total" x="1018" y="390">5</text>
    <rect class="cell" x="1080" y="350" width="190" height="64" rx="8"/>
    <rect class="empty" x="1148" y="394" width="12" height="4" rx="2"/><rect class="sd" x="1172" y="392" width="12" height="6" rx="2"/><rect class="empty" x="1196" y="394" width="12" height="4" rx="2"/>
    <text class="total" x="1238" y="390">1</text>
  </g>

  <g>
    <text class="category" x="78" y="467">Concept Exploration and Development</text>
    <rect class="cell" x="420" y="430" width="190" height="64" rx="8"/>
    <rect class="ed" x="478" y="470" width="12" height="8" rx="2"/><rect class="sd" x="502" y="470" width="12" height="8" rx="2"/><rect class="uiux" x="526" y="468" width="12" height="10" rx="2"/>
    <text class="total" x="578" y="470">2</text>
    <rect class="cell" x="640" y="430" width="190" height="64" rx="8"/>
    <rect class="ed" x="698" y="466" width="12" height="12" rx="2"/><rect class="sd" x="722" y="464" width="12" height="14" rx="2"/><rect class="uiux" x="746" y="466" width="12" height="12" rx="2"/>
    <text class="total" x="798" y="470">5</text>
    <rect class="cell-alt" x="860" y="430" width="190" height="64" rx="8"/>
    <rect class="ed" x="928" y="454" width="12" height="24" rx="2"/><rect class="sd" x="952" y="448" width="12" height="30" rx="2"/><rect class="uiux" x="976" y="442" width="12" height="36" rx="2"/>
    <text class="total" x="1018" y="470">26</text>
    <rect class="cell" x="1080" y="430" width="190" height="64" rx="8"/>
    <rect class="empty" x="1148" y="474" width="12" height="4" rx="2"/><rect class="sd" x="1172" y="470" width="12" height="8" rx="2"/><rect class="empty" x="1196" y="474" width="12" height="4" rx="2"/>
    <text class="total" x="1238" y="470">1</text>
  </g>

  <g>
    <text class="category" x="78" y="547">Documentation and Communication Support</text>
    <rect class="cell" x="420" y="510" width="190" height="64" rx="8"/>
    <rect class="ed" x="478" y="550" width="12" height="8" rx="2"/><rect class="sd" x="502" y="548" width="12" height="10" rx="2"/><rect class="uiux" x="526" y="550" width="12" height="8" rx="2"/>
    <text class="total" x="578" y="550">4</text>
    <rect class="cell" x="640" y="510" width="190" height="64" rx="8"/>
    <rect class="ed" x="698" y="546" width="12" height="12" rx="2"/><rect class="sd" x="722" y="544" width="12" height="14" rx="2"/><rect class="uiux" x="746" y="548" width="12" height="10" rx="2"/>
    <text class="total" x="798" y="550">6</text>
    <rect class="cell-alt" x="860" y="510" width="190" height="64" rx="8"/>
    <rect class="ed" x="928" y="536" width="12" height="22" rx="2"/><rect class="sd" x="952" y="534" width="12" height="24" rx="2"/><rect class="uiux" x="976" y="532" width="12" height="26" rx="2"/>
    <text class="total" x="1018" y="550">11</text>
    <rect class="cell-alt" x="1080" y="510" width="190" height="64" rx="8"/>
    <rect class="ed" x="1148" y="548" width="12" height="10" rx="2"/><rect class="sd" x="1172" y="528" width="12" height="30" rx="2"/><rect class="uiux" x="1196" y="536" width="12" height="22" rx="2"/>
    <text class="total" x="1238" y="550">16</text>
  </g>

  <g>
    <text class="category" x="78" y="627">Design Critique and Assessment</text>
    <rect class="cell" x="420" y="590" width="190" height="64" rx="8"/>
    <rect class="empty" x="478" y="634" width="12" height="4" rx="2"/><rect class="sd" x="502" y="632" width="12" height="6" rx="2"/><rect class="uiux" x="526" y="632" width="12" height="6" rx="2"/>
    <text class="total" x="578" y="630">1</text>
    <rect class="cell-alt" x="640" y="590" width="190" height="64" rx="8"/>
    <rect class="ed" x="698" y="620" width="12" height="18" rx="2"/><rect class="sd" x="722" y="616" width="12" height="22" rx="2"/><rect class="uiux" x="746" y="622" width="12" height="16" rx="2"/>
    <text class="total" x="798" y="630">10</text>
    <rect class="cell-alt" x="860" y="590" width="190" height="64" rx="8"/>
    <rect class="ed" x="928" y="622" width="12" height="16" rx="2"/><rect class="sd" x="952" y="618" width="12" height="20" rx="2"/><rect class="uiux" x="976" y="620" width="12" height="18" rx="2"/>
    <text class="total" x="1018" y="630">10</text>
    <rect class="cell" x="1080" y="590" width="190" height="64" rx="8"/>
    <rect class="ed" x="1148" y="632" width="12" height="6" rx="2"/><rect class="sd" x="1172" y="630" width="12" height="8" rx="2"/><rect class="uiux" x="1196" y="632" width="12" height="6" rx="2"/>
    <text class="total" x="1238" y="630">4</text>
  </g>

  <g>
    <text class="category" x="78" y="707">Others</text>
    <rect class="cell" x="420" y="670" width="190" height="64" rx="8"/>
    <rect class="ed" x="478" y="700" width="12" height="18" rx="2"/><rect class="sd" x="502" y="694" width="12" height="24" rx="2"/><rect class="uiux" x="526" y="702" width="12" height="16" rx="2"/>
    <text class="total" x="578" y="710">11</text>
    <rect class="cell" x="640" y="670" width="190" height="64" rx="8"/>
    <rect class="ed" x="698" y="694" width="12" height="24" rx="2"/><rect class="sd" x="722" y="696" width="12" height="22" rx="2"/><rect class="uiux" x="746" y="698" width="12" height="20" rx="2"/>
    <text class="total" x="798" y="710">17</text>
    <rect class="cell" x="860" y="670" width="190" height="64" rx="8"/>
    <rect class="ed" x="928" y="690" width="12" height="28" rx="2"/><rect class="sd" x="952" y="684" width="12" height="34" rx="2"/><rect class="uiux" x="976" y="688" width="12" height="30" rx="2"/>
    <text class="total" x="1018" y="710">32</text>
    <rect class="cell" x="1080" y="670" width="190" height="64" rx="8"/>
    <rect class="ed" x="1148" y="710" width="12" height="8" rx="2"/><rect class="sd" x="1172" y="700" width="12" height="18" rx="2"/><rect class="uiux" x="1196" y="704" width="12" height="14" rx="2"/>
    <text class="total" x="1238" y="710">15</text>
  </g>

  <rect x="78" y="780" width="1220" height="42" rx="8" fill="#fbfcff" stroke="#d8dee9"/>
  <text class="small" x="100" y="806">Best use: precise comparison inside each phase-category cell. Weakness: many small bars can feel dense, so categories should be filtered to Top N + Others.</text>
</svg>
